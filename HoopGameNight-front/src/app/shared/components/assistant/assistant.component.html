<section class="assistant-pane glass-panel">
  <div class="assistant-header">
    <div class="assistant-title">
      <span class="material-icons ai-sparkle">auto_awesome</span>
      <h3>Coach Assistant</h3>
    </div>
    <div class="ai-status-badge">ASSISTENTE</div>
  </div>

  <div class="assistant-chat" #chatContainer>
    @for (msg of assistantService.messages(); track msg.timestamp) {
    <div class="chat-msg" [class]="'chat-msg--' + msg.role">
      <div class="chat-msg__bubble markdown-body" 
           [innerHTML]="msg.parsedContent || msg.content">
      </div>
    </div>
    } @empty {
    <div class="assistant-welcome">
      <span class="material-icons">forum</span>
      <p>Olá! Como posso ajudar com os jogos de hoje?</p>
    </div>
    }

    @if (assistantService.isTyping()) {
    <div class="chat-msg chat-msg--assistant">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
    }

    @if (assistantService.error()) {
    <div class="chat-error-msg">
      <span class="material-icons">error_outline</span>
      <p>{{ assistantService.error() }}</p>
    </div>
    }
  </div>

  <div class="assistant-input-area">
    <input type="text" placeholder="Diga algo..." 
      [disabled]="assistantService.isTyping()"
      [(ngModel)]="questionText"
      (keyup.enter)="askAssistant()">
    <button class="assistant-send-btn" 
      [disabled]="assistantService.isTyping() || !questionText?.trim()"
      (click)="askAssistant()">
      <span class="material-icons">send</span>
    </button>
  </div>
</section>
